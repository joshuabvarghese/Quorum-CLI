name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job 1: ShellCheck
  # Every script must pass shellcheck with zero warnings before any tests run.
  # ────────────────────────────────────────────────────────────────────────────
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck on all scripts
        run: make check

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2: Inline unit + integration tests (run_tests.sh)
  # The master test runner — 71+ inline tests covering quorum math, cluster
  # lifecycle, storage ops, dry-run safety, and structured logging.
  # ────────────────────────────────────────────────────────────────────────────
  inline-tests:
    name: Inline Tests (run_tests.sh)
    runs-on: ubuntu-latest
    needs: shellcheck
    steps:
      - uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x bin/*.sh scripts/*.sh lib/*.sh tests/run_tests.sh

      - name: Run inline test suite
        run: bash tests/run_tests.sh --fast   # ShellCheck already ran above

      - name: Upload test artefacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: logs/

  # ────────────────────────────────────────────────────────────────────────────
  # Job 3: BATS suite
  # BDD-style tests with test isolation — each test gets its own DATA_DIR.
  # ────────────────────────────────────────────────────────────────────────────
  bats:
    name: BATS Suite
    runs-on: ubuntu-latest
    needs: shellcheck
    steps:
      - uses: actions/checkout@v4

      - name: Install BATS
        run: |
          git clone --depth 1 https://github.com/bats-core/bats-core.git /tmp/bats-src
          mkdir -p tests/bats-vendor/bin
          cp /tmp/bats-src/bin/bats tests/bats-vendor/bin/bats
          cp -r /tmp/bats-src/lib  tests/bats-vendor/lib
          chmod +x tests/bats-vendor/bin/bats

      - name: Make scripts executable
        run: chmod +x bin/*.sh scripts/*.sh lib/*.sh tests/run_tests.sh

      - name: Run BATS quorum math tests
        run: ./tests/bats-vendor/bin/bats tests/quorum_math.bats

      - name: Run BATS cluster manager tests
        run: ./tests/bats-vendor/bin/bats tests/cluster_manager.bats

      - name: Run BATS chaos engineering tests
        run: ./tests/bats-vendor/bin/bats tests/chaos_engineering.bats

      - name: Run BATS network checks tests
        run: ./tests/bats-vendor/bin/bats tests/network_checks.bats

      - name: Run BATS logging tests
        run: ./tests/bats-vendor/bin/bats tests/logging.bats

  # ────────────────────────────────────────────────────────────────────────────
  # Job 4: End-to-end smoke test
  # Runs the full demo script and checks the exit code.
  # ────────────────────────────────────────────────────────────────────────────
  e2e-smoke:
    name: End-to-End Smoke Test
    runs-on: ubuntu-latest
    needs: [inline-tests, bats]
    steps:
      - uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x bin/*.sh scripts/*.sh lib/*.sh tests/run_tests.sh

      - name: Run demo script
        run: bash scripts/demo.sh

      - name: Verify Prometheus metrics endpoint
        run: |
          chmod +x bin/perf-monitor.sh
          bash bin/perf-monitor.sh metrics | grep -q "^quorum_"
          echo "✓ Prometheus metrics output verified"
