name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job 1: ShellCheck
  # Every script must pass shellcheck with zero warnings before any tests run.
  # ────────────────────────────────────────────────────────────────────────────
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Find and check shell scripts
        run: |
          # Find all .sh files and run shellcheck on them
          echo "🔍 Running ShellCheck on all shell scripts..."
          find . -name "*.sh" -type f -not -path "*/\.*" -exec shellcheck {} \; || {
            echo "❌ ShellCheck found issues"
            exit 1
          }
          echo "✅ All shell scripts passed ShellCheck"

      - name: Run make check (if available)
        run: |
          if [ -f "Makefile" ] && grep -q "^check:" Makefile; then
            echo "📦 Running make check..."
            make check
          else
            echo "ℹ️ No Makefile with check target found, skipping"
          fi

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2: Inline unit + integration tests (run_tests.sh)
  # ────────────────────────────────────────────────────────────────────────────
  inline-tests:
    name: Inline Tests (run_tests.sh)
    runs-on: ubuntu-latest
    needs: shellcheck
    steps:
      - uses: actions/checkout@v4

      - name: Create necessary directories
        run: |
          mkdir -p logs
          mkdir -p data
          mkdir -p tests/bats-vendor/bin
          echo "✅ Created directories: logs/, data/, tests/bats-vendor/bin/"

      - name: Make scripts executable
        run: |
          find . -name "*.sh" -type f -exec chmod +x {} \;
          find bin scripts -type f -exec chmod +x {} \; 2>/dev/null || true
          echo "✅ Made scripts executable"

      - name: Check if test script exists
        id: check_tests
        run: |
          if [ -f "tests/run_tests.sh" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ tests/run_tests.sh found"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️ tests/run_tests.sh not found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Run inline test suite
        if: steps.check_tests.outputs.exists == 'true'
        run: |
          echo "🧪 Running inline test suite..."
          bash tests/run_tests.sh --fast || {
            echo "❌ Inline tests failed"
            exit 1
          }
          echo "✅ Inline tests passed"
        continue-on-error: true
        id: run_tests

      - name: Upload test artefacts on failure
        if: failure() || steps.run_tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-inline
          path: logs/
          if-no-files-found: warn

  # ────────────────────────────────────────────────────────────────────────────
  # Job 3: BATS suite
  # ────────────────────────────────────────────────────────────────────────────
  bats:
    name: BATS Suite
    runs-on: ubuntu-latest
    needs: shellcheck
    steps:
      - uses: actions/checkout@v4

      - name: Create directories
        run: |
          mkdir -p logs
          mkdir -p data
          mkdir -p test-results
          echo "✅ Created directories: logs/, data/, test-results/"

      - name: Make scripts executable
        run: |
          find . -name "*.sh" -type f -exec chmod +x {} \;
          find bin scripts -type f -exec chmod +x {} \; 2>/dev/null || true
          echo "✅ Made scripts executable"

      - name: Install BATS
        run: |
          echo "📦 Installing BATS..."
          # Install bats from GitHub releases
          BATS_VERSION="1.10.0"
          wget -q https://github.com/bats-core/bats-core/archive/refs/tags/v$BATS_VERSION.tar.gz
          tar -xzf v$BATS_VERSION.tar.gz
          cd bats-core-$BATS_VERSION
          sudo ./install.sh /usr/local
          cd ..
          
          # Install bats-assert and bats-support for better assertions
          echo "📦 Installing BATS helper libraries..."
          sudo git clone --depth 1 https://github.com/bats-core/bats-assert.git /usr/local/lib/bats-assert
          sudo git clone --depth 1 https://github.com/bats-core/bats-support.git /usr/local/lib/bats-support
          
          # Cleanup
          rm -rf bats-core-$BATS_VERSION v$BATS_VERSION.tar.gz
          echo "✅ BATS installation complete"

      - name: Verify BATS installation
        run: |
          echo "🔍 Verifying BATS installation..."
          bats --version
          which bats
          echo "✅ BATS verification complete"

      - name: Check for BATS test files
        id: check_bats_files
        run: |
          if ls tests/*.bats 1> /dev/null 2>&1; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "✅ Found BATS test files:"
            ls -la tests/*.bats
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "⚠️ No .bats files found in tests/" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Run all BATS tests
        if: steps.check_bats_files.outputs.found == 'true'
        run: |
          echo "🧪 Running all BATS tests..."
          for test_file in tests/*.bats; do
            if [ -f "$test_file" ]; then
              echo "========================================="
              echo "Running $(basename $test_file)"
              echo "========================================="
              bats --pretty "$test_file" || {
                echo "⚠️ $(basename $test_file) had failures"
                echo "$test_file" >> test-results/failed-tests.txt
              }
            fi
          done
          
          if [ -f "test-results/failed-tests.txt" ]; then
            echo "❌ Some BATS tests failed:"
            cat test-results/failed-tests.txt
            exit 1
          else
            echo "✅ All BATS tests passed!"
          fi
        continue-on-error: true
        id: run_all_bats

      - name: Run specific BATS test files with verbose output
        if: always() && steps.check_bats_files.outputs.found == 'true'
        run: |
          echo "🔍 Running detailed BATS tests..."
          # Test files to run if they exist
          for test in quorum_math cluster_manager chaos_engineering network_checks logging; do
            if [ -f "tests/${test}.bats" ]; then
              echo "========================================="
              echo "Running tests/${test}.bats (verbose)"
              echo "========================================="
              bats --verbose-run "tests/${test}.bats" || echo "⚠️ tests/${test}.bats had issues"
            fi
          done

      - name: Upload BATS logs
        if: failure() || steps.run_all_bats.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: bats-logs
          path: |
            logs/
            test-results/
          if-no-files-found: warn

  # ────────────────────────────────────────────────────────────────────────────
  # Job 4: End-to-end smoke test
  # ────────────────────────────────────────────────────────────────────────────
  e2e-smoke:
    name: End-to-End Smoke Test
    runs-on: ubuntu-latest
    needs: [inline-tests, bats]
    if: always() # Run even if previous jobs fail, but check conditionally
    steps:
      - uses: actions/checkout@v4

      - name: Create directories
        run: |
          mkdir -p logs
          mkdir -p data
          mkdir -p metrics
          echo "✅ Created directories: logs/, data/, metrics/"

      - name: Make scripts executable
        run: |
          find . -name "*.sh" -type f -exec chmod +x {} \;
          find bin scripts -type f -exec chmod +x {} \; 2>/dev/null || true
          echo "✅ Made scripts executable"

      - name: Check if demo script exists
        id: check_demo
        run: |
          if [ -f "scripts/demo.sh" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ scripts/demo.sh found"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️ scripts/demo.sh not found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Run demo script
        if: steps.check_demo.outputs.exists == 'true'
        run: |
          echo "🎬 Running demo script..."
          bash scripts/demo.sh || {
            echo "❌ Demo script failed"
            exit 1
          }
          echo "✅ Demo script completed successfully"
        continue-on-error: true
        id: run_demo

      - name: Check perf-monitor script
        id: check_perf
        run: |
          if [ -f "bin/perf-monitor.sh" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ bin/perf-monitor.sh found"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Verify Prometheus metrics endpoint
        if: steps.check_perf.outputs.exists == 'true'
        run: |
          echo "📊 Verifying Prometheus metrics..."
          chmod +x bin/perf-monitor.sh
          if bin/perf-monitor.sh metrics | grep -q "^quorum_"; then
            echo "✅ Prometheus metrics output verified"
          else
            echo "❌ Prometheus metrics verification failed"
            echo "Output was:"
            bin/perf-monitor.sh metrics | head -20
            exit 1
          fi
        continue-on-error: true

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs
          path: |
            logs/
            metrics/
          if-no-files-found: warn

  # ────────────────────────────────────────────────────────────────────────────
  # Job 5: Test Summary
  # ────────────────────────────────────────────────────────────────────────────
  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [shellcheck, inline-tests, bats, e2e-smoke]
    if: always()
    steps:
      - name: Create test summary
        run: |
          echo "# 🧪 CI Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Job Status Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status | Details |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|---------|" >> $GITHUB_STEP_SUMMARY
          
          # ShellCheck status
          if [ "${{ needs.shellcheck.result }}" == "success" ]; then
            echo "| ShellCheck | ✅ Success | All scripts passed linting |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.shellcheck.result }}" == "failure" ]; then
            echo "| ShellCheck | ❌ Failed | ShellCheck found issues |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| ShellCheck | ⚠️ ${{ needs.shellcheck.result }} | |" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Inline Tests status
          if [ "${{ needs.inline-tests.result }}" == "success" ]; then
            echo "| Inline Tests | ✅ Success | All inline tests passed |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.inline-tests.result }}" == "failure" ]; then
            echo "| Inline Tests | ❌ Failed | Inline test suite failed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Inline Tests | ⚠️ ${{ needs.inline-tests.result }} | |" >> $GITHUB_STEP_SUMMARY
          fi
          
          # BATS status
          if [ "${{ needs.bats.result }}" == "success" ]; then
            echo "| BATS Suite | ✅ Success | All BATS tests passed |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.bats.result }}" == "failure" ]; then
            echo "| BATS Suite | ❌ Failed | Some BATS tests failed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| BATS Suite | ⚠️ ${{ needs.bats.result }} | |" >> $GITHUB_STEP_SUMMARY
          fi
          
          # E2E Smoke status
          if [ "${{ needs.e2e-smoke.result }}" == "success" ]; then
            echo "| E2E Smoke | ✅ Success | End-to-end tests passed |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.e2e-smoke.result }}" == "failure" ]; then
            echo "| E2E Smoke | ❌ Failed | Smoke test failed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| E2E Smoke | ⚠️ ${{ needs.e2e-smoke.result }} | |" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📊 Overall Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Overall status
          if [[ "${{ needs.shellcheck.result }}" == "success" ]] && \
             [[ "${{ needs.inline-tests.result }}" == "success" ]] && \
             [[ "${{ needs.bats.result }}" == "success" ]] && \
             [[ "${{ needs.e2e-smoke.result }}" == "success" ]]; then
            echo "### 🎉 All tests passed successfully!" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ⚠️ Some tests failed - check individual job logs for details" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "🕐 Run completed at: $(date)" >> $GITHUB_STEP_SUMMARY

      - name: Check overall status
        run: |
          if [[ "${{ needs.shellcheck.result }}" == "success" ]] && \
             [[ "${{ needs.inline-tests.result }}" == "success" ]] && \
             [[ "${{ needs.bats.result }}" == "success" ]] && \
             [[ "${{ needs.e2e-smoke.result }}" == "success" ]]; then
            echo "✅ All CI checks passed!"
          else
            echo "❌ Some CI checks failed"
            exit 1
          fi