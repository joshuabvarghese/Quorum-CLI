---
apiVersion: 1

datasources:
  - name: Loki
    type: loki
    uid: quorum-loki
    url: http://loki:3100
    access: proxy
    isDefault: false
    jsonData:
      maxLines: 5000

  - name: Prometheus
    type: prometheus
    uid: quorum-prometheus
    url: http://prometheus:9090
    access: proxy
    isDefault: true
    jsonData:
      timeInterval: "10s"
