global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: quorum-cli

alerting:
  alertmanagers:
    - static_configs:
        - targets: [alertmanager:9093]

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: quorum-cluster-metrics
    static_configs:
      - targets: [metrics-exporter:9101]
    metrics_path: /metrics
    scrape_interval: 10s
