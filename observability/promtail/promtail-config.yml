server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/promtail-positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    tenant_id: quorum

scrape_configs:

  # ── Cluster manager logs ──────────────────────────────────────────────────
  - job_name: cluster-manager
    static_configs:
      - targets:
          - localhost
        labels:
          job:       quorum-cluster-manager
          component: cluster-manager
          __path__:  /var/log/quorum/cluster/*.log

    pipeline_stages:
      # Parse the structured log lines emitted by lib/logger.sh
      # Format: [2026-01-15 14:00:01] [INFO ] Cluster created successfully
      - regex:
          expression: '^\[(?P<ts>[^\]]+)\] \[(?P<level>[^\]]+)\] (?P<message>.+)$'

      - labels:
          level: ""

      - timestamp:
          source: ts
          format: "2006-01-02 15:04:05"

      # Index key fields for fast LogQL queries
      - label_drop:
          - filename    # too high-cardinality

  # ── Storage ops logs ─────────────────────────────────────────────────────
  - job_name: storage-ops
    static_configs:
      - targets:
          - localhost
        labels:
          job:       quorum-storage-ops
          component: storage-ops
          __path__:  /var/log/quorum/storage/*.log
    pipeline_stages:
      - regex:
          expression: '^\[(?P<ts>[^\]]+)\] \[(?P<level>[^\]]+)\] (?P<message>.+)$'
      - labels:
          level: ""
      - timestamp:
          source: ts
          format: "2006-01-02 15:04:05"

  # ── Monitoring / perf-monitor logs ────────────────────────────────────────
  - job_name: perf-monitor
    static_configs:
      - targets:
          - localhost
        labels:
          job:       quorum-perf-monitor
          component: perf-monitor
          __path__:  /var/log/quorum/monitoring/*.log
    pipeline_stages:
      - regex:
          expression: '^\[(?P<ts>[^\]]+)\] \[(?P<level>[^\]]+)\] (?P<message>.+)$'
      - labels:
          level: ""
      - timestamp:
          source: ts
          format: "2006-01-02 15:04:05"
