server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: quorum-cli-cluster
    static_configs:
      - targets: [localhost]
        labels:
          job: quorum-cluster-manager
          __path__: /var/log/quorum-cli/cluster/*.log

  - job_name: quorum-cli-storage
    static_configs:
      - targets: [localhost]
        labels:
          job: quorum-storage-ops
          __path__: /var/log/quorum-cli/storage/*.log

  - job_name: quorum-cli-monitoring
    static_configs:
      - targets: [localhost]
        labels:
          job: quorum-perf-monitor
          __path__: /var/log/quorum-cli/monitoring/*.log

  # JSON log pipeline — parse structured fields as Loki labels
  pipeline_stages:
    - json:
        expressions:
          level: level
          cluster_id: cluster_id
          node_id: node_id
    - labels:
        level:
        cluster_id:
        node_id:
