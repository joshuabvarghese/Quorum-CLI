################################################################################
# Alertmanager configuration for Quorum-CLI
#
# Routes:
#   critical (QuorumLost, AllNodesDown)  → PagerDuty + Slack #incidents
#   warning                              → Slack #platform-alerts only
#
# Replace the placeholder receiver URLs with real endpoints.
# For local demo: alerts are logged to the "null" receiver.
################################################################################

global:
  resolve_timeout: 5m
  # smtp_smarthost: 'smtp.example.com:587'  # uncomment for email

route:
  group_by:      [alertname, cluster, cluster_id]
  group_wait:    30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: "default-slack"

  routes:
    # Critical alerts: quorum lost / all nodes down → immediate PagerDuty page
    - match:
        severity: critical
      receiver: pagerduty-critical
      continue: true   # also send to Slack

    # All warning+ go to Slack
    - match_re:
        severity: "warning|critical"
      receiver: default-slack

receivers:

  # ── Default: Slack ──────────────────────────────────────────────────────
  - name: default-slack
    slack_configs:
      - api_url: "https://hooks.slack.com/services/REPLACE_ME"
        channel:  "#platform-alerts"
        title:    '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }} — {{ .GroupLabels.cluster }}'
        text: >
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Severity:* {{ .Labels.severity }}
          {{ if .Annotations.runbook_url }}*Runbook:* {{ .Annotations.runbook_url }}{{ end }}
          {{ end }}
        send_resolved: true

  # ── Critical: PagerDuty ────────────────────────────────────────────────
  - name: pagerduty-critical
    pagerduty_configs:
      - routing_key: "REPLACE_WITH_PAGERDUTY_INTEGRATION_KEY"
        description: '{{ .GroupLabels.alertname }}: {{ .CommonAnnotations.summary }}'
        severity: critical
        details:
          cluster:     '{{ .GroupLabels.cluster }}'
          cluster_id:  '{{ .GroupLabels.cluster_id }}'
          runbook_url: '{{ .CommonAnnotations.runbook_url }}'

  # ── Null receiver (for demo / testing) ─────────────────────────────────
  - name: "null"

inhibit_rules:
  # Suppress QuorumDegraded warnings when QuorumLost (critical) is already firing
  - source_match:
      alertname: QuorumLost
    target_match:
      alertname: QuorumDegraded
    equal: [cluster, cluster_id]

  - source_match:
      alertname: AllNodesDown
    target_match_re:
      alertname: "QuorumLost|QuorumDegraded|ClusterUnhealthy"
    equal: [cluster]
